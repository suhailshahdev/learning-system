services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: learning-system-db
    environment:
      POSTGRES_USER: learning
      POSTGRES_PASSWORD: learning
      POSTGRES_DB: learning
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learning -d learning"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
