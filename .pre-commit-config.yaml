# Pre-commit hooks enforce code quality at commit time so broken
# code cannot enter history. Run `uvx pre-commit install` once
# per clone to wire up the git hooks. Code-quality hooks auto-run
# on `git commit`; the commit-msg hook validates the mesage itself.
# Run all file-stage hooks manually with `uvx pre-commit run
# --all-files`.
#
# Version drift note: the `rev:` fileds below pin hook tool
# versions independently from pyproject.toml / package.json
# When bumping ruff in pyproject.toml, bummp the rev here too.

default_install_hook_types: [pre-commit, commit-msg]

repos:
  # Baseline hygiene hooks. Catch trailing whitespace, missing
  # final newlines, malformed YAML, accidentally-committed
  # merge conflict markers, and files larger than 500kb.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  # Ruff linter and formatter for backend Python. Linter runs
  # with --fix so auto-fixable issues are corrected in place.
  # Formatter runs after the linter so any fixes are formatted.
  # Scoped to backend/ to avoid running Python rules on e.g.
  # alembic-generated migrations only in principle - ruff's
  # per-file-ignores in pyproject.toml still apply.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
    - id: ruff-check
      args: [--fix]
      files: ^backend/
    - id: ruff-format
      files: ^backend/

  # mypy runs as a local hook (not via mirrors-mypy) so it has
  # access to the project's isntalled dependencies. Without
  # that, mypy cannot follow imports into FastAPI, SQLAlchemy,
  # Pydantic, etc.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (backend)
        entry: uv run --directory backend mypy .
        language: system
        pass_filenames: false
        files: ^backend/.*\.py$

      # eslint and tsc run locally because they need the
      # packages installed in frontend/node_modules, which
      # exist only after a `pnpm install` in that directory.
      # Both tools check the whole frontend in one go; the
      # `files:` filter only decides whether to trigger when
      # staged changes touch frontend source.
      - id: eslint
        name: eslint (frontend)
        entry: pnpm -C frontend lint
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(ts|tsx|js|jsx|mjs|cjs)$

      - id: tsc
        name: tsc (frontend)
        entry: pnpm -C frontend typecheck
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(ts|tsx)$

  # Commitlint validates the commit message itself against the
  # Conventional Commit spec. Runs at the `commit-msg` stage
  # (after the file-level hooks above). This hook catches
  # the bigger category: wrong type, malformed
  # structure, missing scope delimiter.
  - repo: https://github.com/opensource-nepal/commitlint
    rev: v1.13.3
    hooks:
      - id: commitlint
        stages: [commit-msg]
