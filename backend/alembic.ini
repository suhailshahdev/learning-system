# Alembic configuration.
#
# Most settings are read by our custom alembic/env.py, which pulls the
# database URL from app.core.config at runtime rather than from this
# file. This keeps all real configuration in one place (.env + config.py)
# and avoids duplicating the DB URL here.

[alembic]
# Path to migration scripts, relative to this file.
script_location = alembic

# Timestamp format for generated migration files.
# Format: 2026_04_19_2304-<rev>_<slug>.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone for the timestamp. UTC keeps things unambigous.
timezone = UTC

# Truncate the slug at this many characters. Keeps filename sane.
truncate_slug_length = 40

# sqlalchemy.url is intentionally blank. see env.py for how the URL is
# sourced. If you're tempted to put a real URL here, don't; it will
# leak into the repo.
sqlalchemy.url =

[post_write_hooks]
# Run our formatter on new migration files so they match project style
# from the moment they're generated.
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys= generic

[logger_root]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt= %H:%M:%S
